{% extends "base.html" %}
{% block title %}Post a Skill – SkillHub{% endblock %}
{% block content %}
<section class="auth-page">
  <div class="auth-card auth-card-wide">
    <h1>Post a Skill</h1>
    <p class="auth-sub">Tell other Kabarak students what you can help with</p>
    <form method="POST" action="{{ url_for('skills_bp.post_skill') }}">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
      <div class="form-group">
        <label>Skill Title</label>
        <input type="text" name="title" placeholder="e.g. React Web App Development" required>
      </div>
      <div class="form-group">
        <label>Category</label>
        <select name="category_id" required>
            <option value="">Select a category</option>
            {% for cat in categories %}
                <option value="{{ cat.id }}">{{ cat.name }}</option>
            {% endfor %}
        </select>
      </div>
      <div class="form-group">
        <label>Description</label>
        <textarea name="description" rows="5" placeholder="Describe what you offer, your experience, and what clients can expect..." required></textarea>
      </div>
      <div class="form-group">
        <label>Tags <small>(comma-separated)</small></label>
        <input type="text" name="tags" placeholder="e.g. React, Node.js, JavaScript">
      </div>
      <div class="form-group">
        <label>Price per Hour (KSh)</label>
        <input type="number" name="price_per_hour" min="50" max="50000" placeholder="e.g. 800" required>
      </div>
      <button type="submit" class="btn btn-primary btn-block">Post Skill</button>
    </form>
  </div>
</section>
{% endblock %}
