{% extends "base.html" %}
{% block title %}Sign Up – SkillHub{% endblock %}
{% block content %}
<section class="auth-page">
  <div class="auth-card">
    <h1>Join SkillHub</h1>
    <p class="auth-sub">Kabarak University students only</p>
    <form method="POST" action="{{ url_for('auth.register') }}">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
      <div class="form-group">
        <label>Full Name</label>
        <input type="text" name="full_name" placeholder="e.g. Amara Kamau" required>
      </div>
      <div class="form-group">
        <label>Kabarak Email</label>
        <input type="email" name="email" placeholder="you@kabarak.ac.ke" pattern=".+@kabarak\.ac\.ke$" required>
        <small>Must end with @kabarak.ac.ke</small>
      </div>
      <div class="form-group">
        <label>Course</label>
        <input type="text" name="course" placeholder="e.g. Computer Science" required>
      </div>
      <div class="form-group">
        <label>Year of Study</label>
        <select name="year_of_study" required>
          <option value="">Select year</option>
          <option value="1">Year 1</option>
          <option value="2">Year 2</option>
          <option value="3">Year 3</option>
          <option value="4">Year 4</option>
          <option value="5">Year 5</option>
        </select>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" name="password" minlength="8" placeholder="At least 8 characters" pattern="^(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*[@$!%*?&#!]).{8,}$" required>
      </div>
      <div class="form-group">
        <label>Confirm Password</label>
        <input type="password" name="confirm_password" placeholder="Repeat password" required>
      </div>
      <button type="submit" class="btn btn-primary btn-block">Create Account</button>
    </form>
    <p class="auth-footer">Already have an account? <a href="{{ url_for('auth.login') }}">Log in</a></p>
  </div>
</section>
{% endblock %}
